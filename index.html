<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Dash - Pro Fixtures & Stats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .active-tab { border-bottom: 3px solid #3b82f6; color: #3b82f6; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen">

    <nav class="bg-[#1e293b] border-b border-slate-700 sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i data-lucide="trophy" class="text-yellow-500"></i>
                <span class="text-xl font-bold tracking-tight">SPORT<span class="text-blue-500">SRC</span></span>
            </div>
            <div class="text-xs bg-slate-800 px-3 py-1 rounded-full border border-slate-600">
                API Status: <span class="text-green-500 font-bold">Connected</span>
            </div>
        </div>
    </nav>

    <div class="bg-[#1e293b] shadow-md">
        <div class="container mx-auto flex justify-center gap-8">
            <button onclick="switchTab('fixtures')" id="tab-fixtures" class="py-4 px-2 font-medium active-tab transition-all">Fixtures</button>
            <button onclick="switchTab('standings')" id="tab-standings" class="py-4 px-2 font-medium text-slate-400 hover:text-white transition-all">Standings</button>
            <button onclick="switchTab('h2h')" id="tab-h2h" class="py-4 px-2 font-medium text-slate-400 hover:text-white transition-all">Head to Head</button>
        </div>
    </div>

    <main class="container mx-auto px-4 py-8">
        
        <section id="content-fixtures" class="content-section">
            <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
                <i data-lucide="calendar"></i> Jadwal Pertandingan
            </h2>
            <div id="list-fixtures" class="grid gap-4 md:grid-cols-2">
                </div>
        </section>

        <section id="content-standings" class="content-section hidden">
            <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
                <i data-lucide="list-ordered"></i> Klasemen Liga
            </h2>
            <div class="overflow-x-auto bg-[#1e293b] rounded-xl border border-slate-700">
                <table class="w-full text-left">
                    <thead class="bg-slate-800 text-slate-400 text-sm uppercase">
                        <tr>
                            <th class="p-4">Pos</th>
                            <th class="p-4">Team</th>
                            <th class="p-4">P</th>
                            <th class="p-4">W</th>
                            <th class="p-4">D</th>
                            <th class="p-4">L</th>
                            <th class="p-4 font-bold text-white">Pts</th>
                        </tr>
                    </thead>
                    <tbody id="list-standings"></tbody>
                </table>
            </div>
        </section>

        <section id="content-h2h" class="content-section hidden">
            <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
                <i data-lucide="swords"></i> Head to Head Analysis
            </h2>
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 text-center">
                <p class="text-slate-400">Pilih pertandingan di menu Fixtures untuk melihat statistik H2H.</p>
            </div>
        </section>

    </main>

    <script>
        // CONFIGURATION
        const API_KEY = '2ae30aee0f4854af5cbfcd1d40ab7d83';
        const BASE_URL = 'https://sportsrc.org/v2';

        // Initialize Icons
        lucide.createIcons();

        // Switch Tab Logic
        function switchTab(tabName) {
            document.querySelectorAll('.content-section').forEach(el => el.classList.add('hidden'));
            document.getElementById(`content-${tabName}`).classList.remove('hidden');
            
            document.querySelectorAll('button[id^="tab-"]').forEach(el => {
                el.classList.remove('active-tab', 'text-white');
                el.classList.add('text-slate-400');
            });
            document.getElementById(`tab-${tabName}`).classList.add('active-tab', 'text-white');
            
            if(tabName === 'standings') fetchStandings();
            if(tabName === 'fixtures') fetchFixtures();
        }

        // Fetch Fixtures
        async function fetchFixtures() {
            const container = document.getElementById('list-fixtures');
            container.innerHTML = `<div class="col-span-full text-center py-10 italic text-slate-500">Loading matches...</div>`;

            try {
                // Catatan: Endpoint /fixtures mungkin perlu disesuaikan sesuai dokumentasi asli sportsrc
                const res = await fetch(`${BASE_URL}/fixtures`, {
                    headers: { 'x-api-key': API_KEY }
                });
                const data = await res.json();
                
                let html = '';
                data.results.forEach(m => {
                    html += `
                    <div class="bg-[#1e293b] p-5 rounded-xl border border-slate-700 hover:border-blue-500 transition cursor-pointer shadow-lg group">
                        <div class="flex justify-between text-[10px] text-blue-400 font-bold uppercase mb-3 tracking-widest">
                            <span>${m.league_name || 'Premier League'}</span>
                            <span class="text-slate-500">${new Date(m.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                        </div>
                        <div class="flex items-center justify-between">
                            <div class="w-1/3 text-center">
                                <p class="font-bold text-sm">${m.home_name}</p>
                            </div>
                            <div class="flex flex-col items-center">
                                <span class="text-xl font-black text-white px-3 py-1 bg-slate-700 rounded-md group-hover:bg-blue-600 transition">VS</span>
                            </div>
                            <div class="w-1/3 text-center">
                                <p class="font-bold text-sm">${m.away_name}</p>
                            </div>
                        </div>
                    </div>`;
                });
                container.innerHTML = html || '<p>No matches found.</p>';
            } catch (e) {
                container.innerHTML = `<p class="text-red-400 text-sm">Error: Pastikan Endpoint & API Key Benar.</p>`;
            }
        }

        // Fetch Standings (Klasemen)
        async function fetchStandings() {
            const tableBody = document.getElementById('list-standings');
            tableBody.innerHTML = `<tr><td colspan="7" class="p-10 text-center animate-pulse">Fetching Table...</td></tr>`;

            try {
                const res = await fetch(`${BASE_URL}/standings?league_id=1`, { // ID 1 sebagai contoh
                    headers: { 'x-api-key': API_KEY }
                });
                const data = await res.json();
                
                let html = '';
                data.results.forEach((team, index) => {
                    html += `
                    <tr class="border-b border-slate-800 hover:bg-slate-800/50 transition">
                        <td class="p-4 font-bold ${index < 4 ? 'text-blue-400' : 'text-slate-500'}">${index + 1}</td>
                        <td class="p-4 font-semibold">${team.team_name}</td>
                        <td class="p-4">${team.played || 0}</td>
                        <td class="p-4">${team.win || 0}</td>
                        <td class="p-4">${team.draw || 0}</td>
                        <td class="p-4">${team.loss || 0}</td>
                        <td class="p-4 font-bold text-white">${team.points || 0}</td>
                    </tr>`;
                });
                tableBody.innerHTML = html;
            } catch (e) {
                tableBody.innerHTML = `<tr><td colspan="7" class="p-10 text-center text-red-500">Gagal memuat klasemen.</td></tr>`;
            }
        }

        // Load awal
        fetchFixtures();
    </script>
</body>
</html>
