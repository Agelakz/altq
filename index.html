<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportsRC - Flashscore Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0B1218; }
        ::-webkit-scrollbar-thumb { background: #2A3540; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #3B4856; }
    </style>
</head>
<body class="bg-[#0B1218] text-gray-300 h-screen flex overflow-hidden">

    <aside class="w-64 bg-[#0B1218] border-r border-[#1E293B] hidden md:flex flex-col">
        <div class="p-4 border-b border-[#1E293B] flex items-center gap-2">
            <i data-lucide="activity" class="text-red-500"></i>
            <span class="text-xl font-bold text-white tracking-tight">SPORT<span class="text-blue-500">SRC</span></span>
        </div>
        
        <div class="flex-1 overflow-y-auto p-4">
            <h3 class="text-xs font-bold text-gray-500 mb-3 flex items-center gap-2">
                <i data-lucide="pin" class="w-3 h-3"></i> PINNED LEAGUES
            </h3>
            <ul class="space-y-1">
                <li><a href="#" class="flex items-center gap-3 px-2 py-1.5 hover:bg-[#1A242D] rounded text-sm text-gray-200"><img src="https://img.sportsrc.org/file/bGvHZ3VlOjEwNzQ6YTZmNzNhMTQ5ODAy.png" class="w-4 h-4 object-contain" onerror="this.onerror=null; this.src='https://placehold.co/16x16/1A242D/475569?text=?';"> Premier League</a></li>
                <li><a href="#" class="flex items-center gap-3 px-2 py-1.5 hover:bg-[#1A242D] rounded text-sm text-gray-200"><img src="https://img.sportsrc.org/file/bGvHZ3VlOjExNjIwOmQ3NmVjMGUyN2M3MA.png" class="w-4 h-4 object-contain" onerror="this.onerror=null; this.src='https://placehold.co/16x16/1A242D/475569?text=?';"> LaLiga</a></li>
                <li><a href="#" class="flex items-center gap-3 px-2 py-1.5 hover:bg-[#1A242D] rounded text-sm text-gray-200"><img src="https://img.sportsrc.org/file/dGVhbToxMzE2OjA4OWJmM2MyODZlYQ.png" class="w-4 h-4 object-contain" onerror="this.onerror=null; this.src='https://placehold.co/16x16/1A242D/475569?text=?';"> Serie A</a></li>
                <li><a href="#" class="flex items-center gap-3 px-2 py-1.5 hover:bg-[#1A242D] rounded text-sm text-gray-200"><img src="https://img.sportsrc.org/file/bGvHZ3VlOjE1NjM6MmU5OWM1YTI3ZjNi.png" class="w-4 h-4 object-contain" onerror="this.onerror=null; this.src='https://placehold.co/16x16/1A242D/475569?text=?';"> Bundesliga</a></li>
                <li><a href="#" class="flex items-center gap-3 px-2 py-1.5 hover:bg-[#1A242D] rounded text-sm text-gray-200"><img src="https://img.sportsrc.org/file/bGvHZ3VlOjQ0NDpmMTA0M2ZkYWViNjQy.png" class="w-4 h-4 object-contain" onerror="this.onerror=null; this.src='https://placehold.co/16x16/1A242D/475569?text=?';"> Ligue 1</a></li>
            </ul>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden">
        
        <header class="bg-[#111820] border-b border-[#1E293B]">
            <nav class="flex overflow-x-auto no-scrollbar">
                <button class="px-6 py-4 flex items-center gap-2 font-bold text-white border-b-2 border-red-500 bg-[#1A242D]">
                    <i data-lucide="dribbble" class="w-5 h-5"></i> FOOTBALL
                </button>
                <button class="px-6 py-4 flex items-center gap-2 font-medium text-gray-400 hover:text-gray-200">
                    <i data-lucide="circle-dot" class="w-5 h-5"></i> TENNIS
                </button>
                <button class="px-6 py-4 flex items-center gap-2 font-medium text-gray-400 hover:text-gray-200">
                    <i data-lucide="medal" class="w-5 h-5"></i> BASKETBALL
                </button>
            </nav>
        </header>

        <div class="bg-[#0B1218] p-4 flex gap-2 border-b border-[#1E293B]">
            <button class="px-4 py-1.5 rounded-full bg-red-600 text-white text-xs font-bold hover:bg-red-700 transition">ALL</button>
            <button class="px-4 py-1.5 rounded-full bg-transparent border border-[#1E293B] text-gray-400 text-xs font-bold hover:text-white hover:border-gray-500 transition">LIVE</button>
            <button class="px-4 py-1.5 rounded-full bg-transparent border border-[#1E293B] text-gray-400 text-xs font-bold hover:text-white hover:border-gray-500 transition">FINISHED</button>
            <button class="px-4 py-1.5 rounded-full bg-transparent border border-[#1E293B] text-gray-400 text-xs font-bold hover:text-white hover:border-gray-500 transition">SCHEDULED</button>
            
            <div class="ml-auto flex items-center text-xs font-medium text-gray-400 bg-[#111820] px-3 rounded border border-[#1E293B]">
                <i data-lucide="calendar" class="w-4 h-4 mr-2"></i> Hari Ini
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-2 md:p-4 bg-[#0B1218]">
            <div id="loading" class="text-center py-10 text-gray-500">
                <i data-lucide="loader-2" class="w-8 h-8 animate-spin mx-auto mb-2"></i>
                Memuat data dari server...
            </div>
            
            <div id="matches-container" class="max-w-4xl mx-auto space-y-4 pb-10">
                </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        const today = new Date().toISOString().split('T')[0];
        const API_URL = `https://api.sportsrc.org/v2/?type=matches&sport=football&date=${today}&api_key=2ae30aee0f4854af5cbfcd1d40ab7d83`;

        async function fetchFixtures() {
            const container = document.getElementById('matches-container');
            const loading = document.getElementById('loading');

            try {
                const response = await fetch(API_URL);
                const result = await response.json();

                if (result.success && result.data) {
                    loading.style.display = 'none';
                    renderData(result.data);
                } else {
                    throw new Error("Tidak ada data pertandingan hari ini.");
                }

            } catch (error) {
                loading.innerHTML = `<div class="text-red-500 py-4 bg-red-900/10 rounded-lg text-center">Gagal memuat jadwal. ${error.message}</div>`;
            }
        }

        function renderData(leaguesData) {
            const container = document.getElementById('matches-container');
            let html = '';

            leaguesData.forEach(leagueObj => {
                const league = leagueObj.league;
                const matches = leagueObj.matches;

                html += `
                <div class="rounded-lg overflow-hidden border border-[#1E293B]">
                    <div class="bg-[#1A242D] px-4 py-2.5 flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <i data-lucide="star" class="w-4 h-4 text-gray-500 hover:text-yellow-500 cursor-pointer transition"></i>
                            <img src="${league.flag || league.logo}" alt="${league.name}" class="w-5 h-5 object-contain" onerror="this.onerror=null; this.src='https://placehold.co/20x20/1A242D/475569?text=?';">
                            <span class="text-xs font-bold text-white uppercase tracking-wider">${league.country}: <span class="text-gray-300 font-semibold">${league.name}</span></span>
                            <i data-lucide="pin" class="w-3.5 h-3.5 text-blue-500 ml-1 hidden md:block"></i>
                        </div>
                        <a href="#" class="text-xs font-medium text-gray-400 hover:text-white flex items-center transition">
                            Standings <i data-lucide="chevron-up" class="w-4 h-4 ml-1"></i>
                        </a>
                    </div>
                    
                    <div class="bg-[#111820]">
                `;

                matches.forEach(match => {
                    const home = match.teams.home;
                    const away = match.teams.away;
                    const status = match.status_detail;
                    
                    const scoreHome = match.score?.current?.home !== undefined ? match.score.current.home : '-';
                    const scoreAway = match.score?.current?.away !== undefined ? match.score.current.away : '-';
                    
                    const isLive = match.status === 'inprogress';
                    const timeClass = isLive ? 'text-red-500 animate-pulse font-bold' : 'text-gray-500';

                    html += `
                        <div class="flex px-4 py-2 border-b border-[#1A242D] hover:bg-[#1A242D]/70 transition cursor-pointer group">
                            <div class="w-8 flex items-center justify-center">
                                <i data-lucide="star" class="w-4 h-4 text-[#2A3540] group-hover:text-gray-400 transition"></i>
                            </div>
                            
                            <div class="w-20 flex items-center text-xs ${timeClass}">
                                ${status}
                            </div>
                            
                            <div class="flex-1 flex flex-col gap-1.5 border-l border-[#1A242D] pl-4">
                                <div class="flex justify-between items-center">
                                    <div class="flex items-center gap-2">
                                        <img src="${home.badge}" class="w-4 h-4 object-contain" onerror="this.onerror=null; this.src='https://placehold.co/16x16/1A242D/475569?text=?';">
                                        <span class="text-sm text-gray-200 ${scoreHome > scoreAway ? 'font-bold text-white' : ''}">${home.name}</span>
                                    </div>
                                    <span class="text-sm font-bold text-white w-6 text-center">${scoreHome}</span>
                                </div>
                                
                                <div class="flex justify-between items-center">
                                    <div class="flex items-center gap-2">
                                        <img src="${away.badge}" class="w-4 h-4 object-contain" onerror="this.onerror=null; this.src='https://placehold.co/16x16/1A242D/475569?text=?';">
                                        <span class="text-sm text-gray-200 ${scoreAway > scoreHome ? 'font-bold text-white' : ''}">${away.name}</span>
                                    </div>
                                    <span class="text-sm font-bold text-white w-6 text-center">${scoreAway}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });

                html += `</div></div>`;
            });

            container.innerHTML = html;
            lucide.createIcons();
        }

        fetchFixtures();
    </script>
</body>
</html>
