<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scorehub - Match Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0B1218; }
        ::-webkit-scrollbar-thumb { background: #2A3540; border-radius: 4px; }
    </style>
</head>
<body class="bg-[#0B1218] text-gray-300 h-screen flex overflow-hidden">

    <aside class="w-64 bg-[#0B1218] border-r border-[#1E293B] hidden md:flex flex-col z-10">
        <div class="p-4 border-b border-[#1E293B] flex items-center gap-2">
            <i data-lucide="activity" class="text-red-500"></i>
            <span class="text-xl font-bold text-white tracking-tight">SCORE<span class="text-blue-500">HUB</span></span>
        </div>
        <div class="flex-1 overflow-y-auto p-4">
            <h3 class="text-xs font-bold text-gray-500 mb-3 flex items-center gap-2">
                <i data-lucide="pin" class="w-3 h-3"></i> PINNED LEAGUES
            </h3>
            <ul class="space-y-1">
                <li><a href="#" class="flex items-center gap-3 px-2 py-1.5 hover:bg-[#1A242D] rounded text-sm text-gray-200"><i data-lucide="trophy" class="w-4 h-4 text-gray-400"></i> Premier League</a></li>
            </ul>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden w-full">
        <header class="bg-[#111820] border-b border-[#1E293B] flex justify-between items-center pr-4">
            <nav class="flex overflow-x-auto no-scrollbar">
                <button class="px-6 py-4 flex items-center gap-2 font-bold text-white border-b-2 border-red-500 bg-[#1A242D]">
                    <i data-lucide="dribbble" class="w-5 h-5"></i> FOOTBALL
                </button>
            </nav>
            <div id="cache-status" class="text-xs font-mono text-gray-500 flex items-center gap-2">
                </div>
        </header>

        <div class="bg-[#0B1218] p-4 flex gap-2 border-b border-[#1E293B] overflow-x-auto">
            <button class="filter-btn px-4 py-1.5 rounded-full bg-red-600 text-white text-xs font-bold">ALL</button>
            <div class="ml-auto flex items-center text-xs font-medium text-gray-400 bg-[#111820] px-3 rounded border border-[#1E293B]">
                <i data-lucide="calendar" class="w-4 h-4 mr-2"></i> Hari Ini
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-2 md:p-4 bg-[#0B1218]">
            <div id="loading" class="text-center py-10 text-gray-500 flex flex-col items-center">
                <i data-lucide="loader-2" class="w-8 h-8 animate-spin mb-3"></i>
                <span>Menghubungkan ke RapidAPI...</span>
            </div>
            
            <div id="debug-container" class="hidden max-w-4xl mx-auto bg-slate-900 border border-slate-700 p-4 rounded-lg overflow-x-auto text-xs font-mono text-green-400"></div>

            <div id="matches-container" class="max-w-4xl mx-auto space-y-4 pb-10"></div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        // KONFIGURASI RAPIDAPI
        const API_HOST = 'scorehub-football-live-scores-api.p.rapidapi.com';
        const API_KEY = 'aa90a97566msh0596dc8fd7c0d9ep13f42bjsna912b1c6ca9d';
        
        // KONFIGURASI CACHE (30 Menit)
        const CACHE_DURATION_MS = 30 * 60 * 1000; 

        // Fungsi Inti: Fetch dengan Cache localStorage
        async function fetchWithCache(endpoint, cacheKey) {
            const url = `https://${API_HOST}/v1/${endpoint}`;
            const cachedData = localStorage.getItem(cacheKey);
            const cacheStatusEl = document.getElementById('cache-status');

            if (cachedData) {
                const parsedData = JSON.parse(cachedData);
                const timePassed = new Date().getTime() - parsedData.timestamp;

                // Jika umur cache masih di bawah 30 menit (CACHE_DURATION_MS)
                if (timePassed < CACHE_DURATION_MS) {
                    const minutesLeft = Math.ceil((CACHE_DURATION_MS - timePassed) / 60000);
                    cacheStatusEl.innerHTML = `<span class="w-2 h-2 rounded-full bg-green-500"></span> Cached (Reset dalam ${minutesLeft}m)`;
                    console.log(`[CACHE HIT] Mengambil dari penyimpanan lokal: ${cacheKey}`);
                    return parsedData.data; // Kembalikan data dari cache
                }
            }

            // Jika tidak ada cache, atau cache sudah kedaluwarsa, ambil dari API
            cacheStatusEl.innerHTML = `<span class="w-2 h-2 rounded-full bg-yellow-500 animate-ping"></span> Fetching API...`;
            console.log(`[API FETCH] Meminta data baru dari RapidAPI: ${endpoint}`);

            try {
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-rapidapi-host': API_HOST,
                        'x-rapidapi-key': API_KEY
                    }
                });

                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const data = await response.json();

                // Simpan hasil fetch ke localStorage beserta waktu (timestamp) saat ini
                localStorage.setItem(cacheKey, JSON.stringify({
                    timestamp: new Date().getTime(),
                    data: data
                }));

                cacheStatusEl.innerHTML = `<span class="w-2 h-2 rounded-full bg-green-500"></span> Cache Updated`;
                return data;

            } catch (error) {
                cacheStatusEl.innerHTML = `<span class="w-2 h-2 rounded-full bg-red-500"></span> API Error`;
                console.error("Gagal mengambil data dari API:", error);
                throw error;
            }
        }

        // FUNGSI UTAMA UNTUK MENGAMBIL JADWAL
        async function initDashboard() {
            try {
                // Memanggil endpoint fixtures dengan cache key 'cache_fixtures_today'
                const fixturesData = await fetchWithCache('fixtures.php', 'cache_fixtures_today');
                
                document.getElementById('loading').style.display = 'none';
                
                // MENGANALISIS STRUKTUR DATA (Karena API ganti)
                const debugContainer = document.getElementById('debug-container');
                debugContainer.classList.remove('hidden');
                
                // Menampilkan sedikit cuplikan JSON mentah agar kita tahu cara merendernya
                debugContainer.innerText = "// STRUKTUR JSON SCOREHUB API (Contoh 1 Item):\n\n" + 
                                          JSON.stringify(fixturesData[0] || fixturesData.data?.[0] || fixturesData, null, 2);
                
                document.getElementById('matches-container').innerHTML = `
                    <div class="p-6 bg-blue-900/20 border border-blue-500 rounded-lg text-blue-200">
                        <h3 class="font-bold text-lg mb-2">Berhasil Terhubung! 🚀</h3>
                        <p class="text-sm mb-4">Sistem Cache 30 Menit sudah aktif. Kuota Anda aman meski di-refresh berkali-kali.</p>
                        <p class="text-sm">Lihat kotak struktur JSON di atas. Karena kita berganti dari SportSRC ke Scorehub, nama variabel (seperti homeTeam, leagueName, skor, dll) di dalam JSON pasti berbeda.</p>
                    </div>`;

            } catch (error) {
                document.getElementById('loading').innerHTML = `
                    <div class="text-red-500 py-4 bg-red-900/20 border border-red-500 rounded text-center w-full">
                        Gagal memuat jadwal. Pastikan API Key RapidAPI Anda benar.<br>
                        Error: ${error.message}
                    </div>`;
            }
        }

        // Jalankan saat aplikasi dibuka
        initDashboard();

    </script>
</body>
</html>
