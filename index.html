<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportsRC - Live Fixtures</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .active-tab { border-bottom: 3px solid #3b82f6; color: #3b82f6; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen">

    <nav class="bg-[#1e293b] border-b border-slate-700 sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i data-lucide="activity" class="text-red-500 animate-pulse"></i>
                <span class="text-xl font-bold tracking-tight">SPORT<span class="text-blue-500">SRC</span></span>
            </div>
        </div>
    </nav>

    <div class="bg-[#1e293b] shadow-md mb-8">
        <div class="container mx-auto flex justify-center gap-8">
            <button class="py-4 px-2 font-medium active-tab transition-all">Fixtures</button>
            <button class="py-4 px-2 font-medium text-slate-500 cursor-not-allowed" title="Butuh endpoint standings">Standings</button>
            <button class="py-4 px-2 font-medium text-slate-500 cursor-not-allowed" title="Butuh endpoint h2h">Head to Head</button>
        </div>
    </div>

    <main class="container mx-auto px-4 pb-12">
        <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
            <i data-lucide="calendar"></i> Jadwal & Live Score
        </h2>
        
        <div id="loading" class="text-center py-10 text-blue-400 animate-pulse">
            Mengambil data dari server...
        </div>

        <div id="fixtures-container" class="space-y-8">
            </div>
    </main>

    <script>
        // Inisialisasi ikon
        lucide.createIcons();

        // URL ASLI DARI SCREENSHOT ANDA
        const API_URL = "https://api.sportsrc.org/v2/?type=matches&api_key=2ae30aee0f4854af5cbfcd1d40ab7d83";

        async function fetchFixtures() {
            const container = document.getElementById('fixtures-container');
            const loading = document.getElementById('loading');

            try {
                // Fetch menggunakan metode GET biasa (tanpa header khusus untuk menghindari CORS)
                const response = await fetch(API_URL);
                const result = await response.json();

                if (result.success && result.data) {
                    loading.style.display = 'none';
                    renderData(result.data);
                } else {
                    throw new Error("Format data tidak sesuai atau gagal memuat.");
                }

            } catch (error) {
                loading.innerHTML = `<span class="text-red-500">Error: Gagal memuat data. (${error.message})</span>`;
                console.error("Fetch Error:", error);
            }
        }

        function renderData(leaguesData) {
            const container = document.getElementById('fixtures-container');
            let html = '';

            // Looping setiap Liga
            leaguesData.forEach(leagueObj => {
                const league = leagueObj.league;
                const matches = leagueObj.matches;

                // Header Liga (Nama & Logo Liga)
                html += `
                <div class="bg-[#1e293b] rounded-xl border border-slate-700 overflow-hidden shadow-lg">
                    <div class="bg-slate-800 px-4 py-3 border-b border-slate-700 flex items-center gap-3">
                        <img src="${league.logo}" alt="${league.name}" class="w-6 h-6 object-contain" onerror="this.src='https://via.placeholder.com/24'">
                        <h3 class="font-bold text-white tracking-wide">${league.name} <span class="text-slate-500 text-sm font-normal">(${league.country})</span></h3>
                    </div>
                    <div class="p-4 grid gap-4 md:grid-cols-2 lg:grid-cols-3">
                `;

                // Looping setiap pertandingan di dalam liga tersebut
                matches.forEach(match => {
                    const home = match.teams.home;
                    const away = match.teams.away;
                    const status = match.status_detail; // "Ended", "Not started", dll
                    const isLive = match.status === "inprogress"; // Asumsi jika ada status inprogress
                    
                    // Format waktu dari Timestamp (Epoch ms) ke Waktu Lokal
                    const matchTime = new Date(match.timestamp).toLocaleTimeString('id-ID', {
                        hour: '2-digit', minute: '2-digit'
                    });

                    // Skor (menangani null jika belum mulai)
                    const scoreDisplay = match.score.display || "VS";
                    const scoreClass = scoreDisplay === "VS" ? "bg-slate-700 text-sm" : "bg-blue-600 text-lg font-black";

                    html += `
                        <div class="bg-slate-900/50 p-4 rounded-lg border border-slate-700/50 hover:border-blue-500 transition">
                            <div class="text-center text-xs font-semibold mb-3 ${isLive ? 'text-red-500 animate-pulse' : 'text-slate-400'}">
                                ${status} • ${matchTime}
                            </div>
                            
                            <div class="flex justify-between items-center">
                                <div class="flex flex-col items-center w-2/5 text-center gap-2">
                                    <img src="${home.badge}" class="w-10 h-10 object-contain" alt="${home.name}" onerror="this.src='https://via.placeholder.com/40'">
                                    <span class="text-sm font-bold truncate w-full" title="${home.name}">${home.name}</span>
                                </div>

                                <div class="w-1/5 flex justify-center">
                                    <div class="px-3 py-1 rounded text-white ${scoreClass} whitespace-nowrap">
                                        ${scoreDisplay}
                                    </div>
                                </div>

                                <div class="flex flex-col items-center w-2/5 text-center gap-2">
                                    <img src="${away.badge}" class="w-10 h-10 object-contain" alt="${away.name}" onerror="this.src='https://via.placeholder.com/40'">
                                    <span class="text-sm font-bold truncate w-full" title="${away.name}">${away.name}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });

                html += `</div></div>`; // Tutup grid & container liga
            });

            container.innerHTML = html;
        }

        // Jalankan fetch saat halaman dibuka
        fetchFixtures();

        // Auto Refresh tiap 1 menit
        setInterval(fetchFixtures, 60000);

    </script>
</body>
</html>
