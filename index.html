<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scorehub - Match Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0B1218; }
        ::-webkit-scrollbar-thumb { background: #2A3540; border-radius: 4px; }
    </style>
</head>
<body class="bg-[#0B1218] text-gray-300 h-screen flex overflow-hidden">

    <aside class="w-64 bg-[#0B1218] border-r border-[#1E293B] hidden md:flex flex-col z-10">
        <div class="p-4 border-b border-[#1E293B] flex items-center gap-2">
            <i data-lucide="activity" class="text-red-500"></i>
            <span class="text-xl font-bold text-white tracking-tight">SCORE<span class="text-blue-500">HUB</span></span>
        </div>
        <div class="flex-1 overflow-y-auto p-4">
            <h3 class="text-xs font-bold text-gray-500 mb-3 flex items-center gap-2">
                <i data-lucide="pin" class="w-3 h-3"></i> PINNED LEAGUES
            </h3>
            <ul class="space-y-1">
                <li><a href="#" class="flex items-center gap-3 px-2 py-1.5 hover:bg-[#1A242D] rounded text-sm text-gray-200"><i data-lucide="trophy" class="w-4 h-4 text-gray-400"></i> Premier League</a></li>
            </ul>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden w-full">
        <header class="bg-[#111820] border-b border-[#1E293B] flex justify-between items-center pr-4">
            <nav class="flex overflow-x-auto no-scrollbar">
                <button class="px-6 py-4 flex items-center gap-2 font-bold text-white border-b-2 border-red-500 bg-[#1A242D]">
                    <i data-lucide="dribbble" class="w-5 h-5"></i> FOOTBALL
                </button>
            </nav>
            <div id="cache-status" class="text-xs font-mono text-gray-500 flex items-center gap-2"></div>
        </header>

        <div class="bg-[#0B1218] p-4 flex gap-2 border-b border-[#1E293B] overflow-x-auto">
            <button class="filter-btn px-4 py-1.5 rounded-full bg-red-600 text-white text-xs font-bold">ALL</button>
            <div class="ml-auto flex items-center text-xs font-medium text-gray-400 bg-[#111820] px-3 rounded border border-[#1E293B]">
                <i data-lucide="calendar" class="w-4 h-4 mr-2"></i> Hari Ini
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-2 md:p-4 bg-[#0B1218]">
            <div id="loading" class="text-center py-10 text-gray-500 flex flex-col items-center">
                <i data-lucide="loader-2" class="w-8 h-8 animate-spin mb-3"></i>
                <span>Memuat data...</span>
            </div>
            
            <div id="matches-container" class="max-w-4xl mx-auto space-y-4 pb-10"></div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        // KONFIGURASI RAPIDAPI
        const API_HOST = 'scorehub-football-live-scores-api.p.rapidapi.com';
        const API_KEY = 'aa90a97566msh0596dc8fd7c0d9ep13f42bjsna912b1c6ca9d';
        const CACHE_DURATION_MS = 30 * 60 * 1000; 

        async function fetchWithCache(endpoint, cacheKey) {
            const url = `https://${API_HOST}/v1/${endpoint}`;
            const cachedData = localStorage.getItem(cacheKey);
            const cacheStatusEl = document.getElementById('cache-status');

            if (cachedData) {
                const parsedData = JSON.parse(cachedData);
                const timePassed = new Date().getTime() - parsedData.timestamp;

                if (timePassed < CACHE_DURATION_MS) {
                    const minutesLeft = Math.ceil((CACHE_DURATION_MS - timePassed) / 60000);
                    cacheStatusEl.innerHTML = `<span class="w-2 h-2 rounded-full bg-green-500"></span> Cached (${minutesLeft}m left)`;
                    return parsedData.data; 
                }
            }

            cacheStatusEl.innerHTML = `<span class="w-2 h-2 rounded-full bg-yellow-500 animate-ping"></span> Fetching API...`;

            try {
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-rapidapi-host': API_HOST,
                        'x-rapidapi-key': API_KEY
                    }
                });

                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const data = await response.json();
                const actualData = data.response || data.data || data;

                localStorage.setItem(cacheKey, JSON.stringify({
                    timestamp: new Date().getTime(),
                    data: actualData
                }));

                cacheStatusEl.innerHTML = `<span class="w-2 h-2 rounded-full bg-green-500"></span> Cache Updated`;
                return actualData;

            } catch (error) {
                cacheStatusEl.innerHTML = `<span class="w-2 h-2 rounded-full bg-red-500"></span> API Error`;
                throw error;
            }
        }

        async function loadFixtures() {
            try {
                // Ambil data dari cache atau API
                let rawData = await fetchWithCache('fixtures.php', 'cache_fixtures_today');
                document.getElementById('loading').style.display = 'none';
                
                // --- PENCARI ARRAY OTOMATIS (SMART PARSER) ---
                let matches = [];
                
                if (Array.isArray(rawData)) {
                    matches = rawData; 
                } else if (rawData && typeof rawData === 'object') {
                    for (const key in rawData) {
                        if (Array.isArray(rawData[key])) {
                            matches = rawData[key];
                            break;
                        }
                    }
                    if (matches.length === 0 && rawData.match_id) {
                        matches = [rawData]; 
                    }
                }

                // --- PROSES RENDER ---
                if (matches.length > 0) {
                    const groupedMatches = {};
                    matches.forEach(match => {
                        const leagueName = match.competition_name || "LIGA LAINNYA";
                        if (!groupedMatches[leagueName]) {
                            groupedMatches[leagueName] = [];
                        }
                        groupedMatches[leagueName].push(match);
                    });
                    
                    renderGroupedMatches(groupedMatches);
                } else {
                    document.getElementById('matches-container').innerHTML = `
                        <div class="text-left bg-red-900/20 border border-red-500 rounded-lg p-6">
                            <h3 class="font-bold text-red-500 text-lg mb-2">Data Perlu Di-refresh</h3>
                            <p class="text-sm text-gray-300 mb-4">Sistem mendeteksi format lama yang tersimpan di memori. Silakan klik tombol di bawah ini untuk membersihkan cache dan mengambil data baru:</p>
                            <button onclick="localStorage.clear(); location.reload();" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded mb-4 transition flex items-center gap-2">
                                <i data-lucide="refresh-cw" class="w-4 h-4"></i> Hapus Cache & Refresh
                            </button>
                            <div class="bg-slate-900 p-3 rounded overflow-auto max-h-40">
                                <pre class="text-xs text-yellow-400 font-mono">${JSON.stringify(rawData, null, 2)}</pre>
                            </div>
                        </div>`;
                    lucide.createIcons();
                }

            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('matches-container').innerHTML = `
                    <div class="text-red-500 py-4 text-center bg-red-900/20 border border-red-500 rounded">
                        Gagal memuat jadwal. Error: ${error.message}
                    </div>`;
            }
        }

        function renderGroupedMatches(groupedMatches) {
            const container = document.getElementById('matches-container');
            let html = '';

            for (const [leagueName, matches] of Object.entries(groupedMatches)) {
                html += `
                <div class="rounded-lg overflow-hidden border border-[#1E293B]">
                    <div class="bg-[#1A242D] px-4 py-2.5 flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <i data-lucide="star" class="w-4 h-4 text-gray-500 hover:text-yellow-500 cursor-pointer transition"></i>
                            <span class="text-xs font-bold text-white uppercase tracking-wider">${leagueName}</span>
                        </div>
                        <a href="#" class="text-xs font-medium text-gray-400 hover:text-white flex items-center transition">
                            Standings <i data-lucide="chevron-up" class="w-4 h-4 ml-1"></i>
                        </a>
                    </div>
                    
                    <div class="bg-[#111820]">
                `;

                matches.forEach(match => {
                    const homeName = match.home_team?.name || "Tim Kandang";
                    const awayName = match.away_team?.name || "Tim Tandang";
                    const homeScore = match.home_team?.goals !== null && match.home_team?.goals !== undefined ? match.home_team.goals : '-';
                    const awayScore = match.away_team?.goals !== null && match.away_team?.goals !== undefined ? match.away_team.goals : '-';
                    const status = match.status || "Scheduled";
                    
                    let matchTime = status;
                    if (match.start_time) {
                        const dateObj = new Date(match.start_time);
                        const hours = dateObj.getHours().toString().padStart(2, '0');
                        const minutes = dateObj.getMinutes().toString().padStart(2, '0');
                        matchTime = `${hours}:${minutes}`;
                    }
                    
                    const displayStatus = (status === 'Ended' || status === 'Finished') ? 'FT' : (status === 'Live' ? 'LIVE' : matchTime);
                    const timeClass = (status === 'Live' || status === 'In Progress') ? 'text-red-500 animate-pulse font-bold' : 'text-gray-500';

                    html += `
                        <div class="flex px-4 py-2 border-b border-[#1A242D] hover:bg-[#1A242D]/70 transition cursor-pointer group">
                            <div class="w-8 flex items-center justify-center">
                                <i data-lucide="star" class="w-4 h-4 text-[#2A3540] group-hover:text-gray-400 transition"></i>
                            </div>
                            
                            <div class="w-20 flex items-center text-xs ${timeClass}">
                                ${displayStatus}
                            </div>
                            
                            <div class="flex-1 flex flex-col gap-1.5 border-l border-[#1A242D] pl-4">
                                <div class="flex justify-between items-center">
                                    <div class="flex items-center gap-2">
                                        <div class="w-4 h-4 bg-slate-700 rounded-full flex items-center justify-center text-[8px] text-white overflow-hidden">
                                            ${homeName.substring(0,2).toUpperCase()}
                                        </div>
                                        <span class="text-sm text-gray-200 ${homeScore > awayScore ? 'font-bold text-white' : ''}">${homeName}</span>
                                    </div>
                                    <span class="text-sm font-bold text-white w-6 text-center">${homeScore}</span>
                                </div>
                                
                                <div class="flex justify-between items-center">
                                    <div class="flex items-center gap-2">
                                        <div class="w-4 h-4 bg-slate-700 rounded-full flex items-center justify-center text-[8px] text-white overflow-hidden">
                                            ${awayName.substring(0,2).toUpperCase()}
                                        </div>
                                        <span class="text-sm text-gray-200 ${awayScore > homeScore ? 'font-bold text-white' : ''}">${awayName}</span>
                                    </div>
                                    <span class="text-sm font-bold text-white w-6 text-center">${awayScore}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });

                html += `</div></div>`;
            }

            container.innerHTML = html;
            lucide.createIcons();
        }

        loadFixtures();
    </script>
</body>
</html>
